<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DX11Loader - Admin</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #0A0A0A;
            color: #E0E0E0;
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1100px;
            margin: 0 auto;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 0;
            border-bottom: 1px solid #2A2A2A;
            margin-bottom: 30px;
            flex-wrap: wrap;
            gap: 15px;
        }
        .header h1 {
            color: #00D4FF;
            font-weight: 300;
            font-size: 28px;
            letter-spacing: 1px;
        }
        .header .badge {
            background: #FF4444;
            color: #FFFFFF;
            padding: 4px 12px;
            border-radius: 4px;
            font-weight: 600;
            font-size: 12px;
        }
        .header .back-link {
            color: #00D4FF;
            text-decoration: none;
            font-size: 14px;
            padding: 8px 16px;
            border: 1px solid #00D4FF;
            border-radius: 4px;
            transition: all 0.3s;
        }
        .header .back-link:hover {
            background: rgba(0, 212, 255, 0.1);
        }
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: #1A1A1A;
            padding: 20px;
            border-radius: 8px;
            border: 1px solid #2A2A2A;
        }
        .stat-card .label {
            color: #666;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .stat-card .value {
            color: #00D4FF;
            font-size: 28px;
            font-weight: 600;
            margin-top: 5px;
        }
        .stat-card .value.expired {
            color: #FF4444;
        }
        .card {
            background: #1A1A1A;
            border-radius: 8px;
            padding: 25px;
            border: 1px solid #2A2A2A;
            margin-bottom: 20px;
        }
        .card h2 {
            font-weight: 400;
            font-size: 18px;
            margin-bottom: 20px;
            color: #E0E0E0;
        }
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        .form-group label {
            display: block;
            color: #888;
            font-size: 13px;
            margin-bottom: 5px;
        }
        .form-group input, .form-group select {
            width: 100%;
            padding: 11px 14px;
            background: #0A0A0A;
            border: 1px solid #2A2A2A;
            border-radius: 4px;
            color: #E0E0E0;
            font-size: 14px;
            outline: none;
            transition: border-color 0.3s;
        }
        .form-group input:focus, .form-group select:focus {
            border-color: #00D4FF;
        }
        .form-group select option {
            background: #1A1A1A;
            color: #E0E0E0;
        }
        .btn-primary {
            padding: 12px 24px;
            background: #00D4FF;
            color: #0A0A0A;
            border: none;
            border-radius: 4px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        .btn-primary:hover {
            background: #00E5FF;
            transform: scale(1.02);
        }
        .btn-danger {
            padding: 12px 24px;
            background: #FF4444;
            color: #FFFFFF;
            border: none;
            border-radius: 4px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        .btn-danger:hover {
            background: #FF6666;
        }
        .btn-secondary {
            padding: 12px 24px;
            background: transparent;
            color: #00D4FF;
            border: 1px solid #2A2A2A;
            border-radius: 4px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        .btn-secondary:hover {
            border-color: #00D4FF;
        }
        .btn-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-top: 10px;
        }
        .table-wrapper {
            overflow-x: auto;
            max-height: 450px;
            overflow-y: auto;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 600px;
            font-size: 14px;
        }
        thead {
            position: sticky;
            top: 0;
            z-index: 10;
        }
        th {
            background: #0A0A0A;
            padding: 12px 15px;
            text-align: left;
            color: #666;
            font-weight: 600;
            font-size: 12px;
            text-transform: uppercase;
            border-bottom: 2px solid #2A2A2A;
        }
        td {
            padding: 12px 15px;
            border-bottom: 1px solid #2A2A2A;
            color: #E0E0E0;
        }
        tr:hover td {
            background: #222;
        }
        .key-code {
            font-family: 'Consolas', monospace;
            color: #00D4FF;
            font-size: 13px;
        }
        .key-expired {
            color: #FF4444;
        }
        .key-active {
            color: #00C851;
        }
        .key-infinity {
            color: #FFD700;
        }
        .empty {
            text-align: center;
            padding: 30px;
            color: #555;
        }
        .badge-status {
            padding: 3px 10px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 600;
        }
        .badge-status.active {
            background: #003320;
            color: #00C851;
        }
        .badge-status.expired {
            background: #330000;
            color: #FF4444;
        }
        .badge-status.infinity {
            background: #332200;
            color: #FFD700;
        }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #0A0A0A; }
        ::-webkit-scrollbar-thumb { background: #2A2A2A; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #3A3A3A; }
        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: #1A1A1A;
            border: 1px solid #00D4FF;
            padding: 15px 25px;
            border-radius: 8px;
            color: #E0E0E0;
            font-size: 14px;
            display: none;
            z-index: 999;
            animation: slideUp 0.3s ease;
        }
        .toast.show { display: block; }
        .toast.success { border-color: #00C851; }
        .toast.error { border-color: #FF4444; }
        .toast.info { border-color: #00D4FF; }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .password-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(10, 10, 10, 0.95);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            backdrop-filter: blur(10px);
        }
        .password-box {
            background: #1A1A1A;
            padding: 40px;
            border-radius: 12px;
            border: 1px solid #2A2A2A;
            max-width: 400px;
            width: 90%;
            text-align: center;
        }
        .password-box h2 {
            color: #00D4FF;
            font-weight: 300;
            font-size: 24px;
            margin-bottom: 10px;
        }
        .password-box p {
            color: #666;
            font-size: 14px;
            margin-bottom: 20px;
        }
        .password-box input {
            width: 100%;
            padding: 12px 14px;
            background: #0A0A0A;
            border: 1px solid #2A2A2A;
            border-radius: 4px;
            color: #E0E0E0;
            font-size: 16px;
            outline: none;
            text-align: center;
            letter-spacing: 4px;
        }
        .password-box input:focus {
            border-color: #00D4FF;
        }
        .password-box .btn-primary {
            width: 100%;
            margin-top: 15px;
        }
        .password-box .error {
            color: #FF4444;
            font-size: 13px;
            margin-top: 10px;
            display: none;
        }
        .main-content {
            display: none;
        }
        .generated-box {
            background: #0A0A0A;
            padding: 15px;
            border-radius: 4px;
            border: 1px solid #00D4FF;
            margin-top: 15px;
            display: none;
        }
        .generated-box .label {
            color: #666;
            font-size: 12px;
        }
        .generated-box .key {
            font-family: 'Consolas', monospace;
            color: #00D4FF;
            font-size: 18px;
            margin-top: 5px;
            word-break: break-all;
        }
        .generated-box .btn-secondary {
            margin-top: 10px;
            padding: 8px 16px;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <!-- SENHA -->
    <div class="password-overlay" id="passwordOverlay">
        <div class="password-box">
            <h2>Admin Access</h2>
            <p>Enter administrator password</p>
            <input type="password" id="adminPassword" placeholder="••••••••" maxlength="20" autofocus>
            <button class="btn-primary" onclick="verifyPassword()">Access</button>
            <div class="error" id="passwordError">Invalid password</div>
        </div>
    </div>

    <!-- CONTEÚDO -->
    <div class="container main-content" id="mainContent">
        <div class="header">
            <h1>DX11LOADER</h1>
            <div style="display: flex; gap: 10px; align-items: center; flex-wrap: wrap;">
                <span class="badge">ADMIN</span>
                <a href="index.html" class="back-link">Back</a>
            </div>
        </div>

        <div class="stats" id="stats">
            <div class="stat-card">
                <div class="label">Total Keys</div>
                <div class="value" id="totalKeys">0</div>
            </div>
            <div class="stat-card">
                <div class="label">Active Keys</div>
                <div class="value" id="activeKeys">0</div>
            </div>
            <div class="stat-card">
                <div class="label">Expired Keys</div>
                <div class="value expired" id="expiredKeys">0</div>
            </div>
        </div>

        <!-- CREATE KEY -->
        <div class="card">
            <h2>Create License Key</h2>
            <form id="createKeyForm">
                <div class="form-row">
                    <div class="form-group">
                        <label>Key Prefix (optional)</label>
                        <input type="text" id="keyPrefix" placeholder="e.g., DX11">
                    </div>
                    <div class="form-group">
                        <label>Key Name / User</label>
                        <input type="text" id="keyName" placeholder="e.g., User123" required>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Expiration</label>
                        <select id="keyExpiration">
                            <option value="1h">1 Hour</option>
                            <option value="6h">6 Hours</option>
                            <option value="12h">12 Hours</option>
                            <option value="1d">1 Day</option>
                            <option value="3d">3 Days</option>
                            <option value="7d">7 Days</option>
                            <option value="30d">30 Days</option>
                            <option value="90d">90 Days</option>
                            <option value="365d">1 Year</option>
                            <option value="infinity" selected>Infinity</option>
                        </select>
                    </div>
                    <div class="form-group" style="display: flex; align-items: flex-end;">
                        <button type="submit" class="btn-primary" style="width: 100%;">Generate Key</button>
                    </div>
                </div>
            </form>
            <div class="generated-box" id="generatedBox">
                <div class="label">Generated Key:</div>
                <div class="key" id="newKeyDisplay"></div>
                <button class="btn-secondary" onclick="copyKey()">Copy</button>
            </div>
        </div>

        <!-- KEYS LIST -->
        <div class="card">
            <h2>Keys Management</h2>
            <div class="btn-group" style="margin-bottom: 15px;">
                <button class="btn-danger" onclick="deleteAllKeys()">Delete All Keys</button>
                <button class="btn-secondary" onclick="loadKeys()">Refresh</button>
            </div>
            <div class="table-wrapper">
                <table>
                    <thead>
                        <tr>
                            <th>Key</th>
                            <th>Name</th>
                            <th>Expires</th>
                            <th>Status</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody id="keysTable">
                        <tr><td colspan="5" class="empty">No keys found</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        // ========================================
        // PROTECTION
        // ========================================
        document.addEventListener('keydown', function(e) {
            if (e.key === 'F12' || 
                (e.ctrlKey && e.shiftKey && (e.key === 'I' || e.key === 'J' || e.key === 'C')) ||
                (e.ctrlKey && e.key === 'U') ||
                (e.ctrlKey && e.key === 'S')) {
                e.preventDefault();
                return false;
            }
        });

        document.addEventListener('contextmenu', function(e) {
            e.preventDefault();
            return false;
        });

        if (window.top !== window.self) {
            document.body.innerHTML = '<h1 style="color:#FF4444;text-align:center;margin-top:50px;">Access Denied</h1>';
        }

        // ========================================
        // PASSWORD
        // ========================================
        const ADMIN_PASSWORD = 'admin123';

        function verifyPassword() {
            const input = document.getElementById('adminPassword');
            const error = document.getElementById('passwordError');
            
            if (input.value === ADMIN_PASSWORD) {
                document.getElementById('passwordOverlay').style.display = 'none';
                document.getElementById('mainContent').style.display = 'block';
                loadKeys();
                showToast('Access granted', 'success');
            } else {
                error.style.display = 'block';
                input.value = '';
                input.focus();
                setTimeout(() => { error.style.display = 'none'; }, 3000);
                showToast('Invalid password', 'error');
            }
        }

        document.addEventListener('DOMContentLoaded', function() {
            document.getElementById('adminPassword').addEventListener('keydown', function(e) {
                if (e.key === 'Enter') verifyPassword();
            });
        });

        // ========================================
        // DATABASE
        // ========================================
        const DB = {
            getKeys() {
                try {
                    return JSON.parse(localStorage.getItem('dx11_keys') || '[]');
                } catch {
                    return [];
                }
            },
            setKeys(keys) {
                localStorage.setItem('dx11_keys', JSON.stringify(keys));
            }
        };

        // ========================================
        // KEY FUNCTIONS
        // ========================================

        function generateKey(prefix) {
            const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
            let key = '';
            if (prefix) key += prefix.toUpperCase() + '-';
            
            const segments = [];
            for (let s = 0; s < 4; s++) {
                let segment = '';
                for (let i = 0; i < 4; i++) {
                    segment += chars.charAt(Math.floor(Math.random() * chars.length));
                }
                segments.push(segment);
            }
            
            return key + segments.join('-');
        }

        function getExpirationDate(expiration) {
            if (expiration === 'infinity') return 'infinity';
            
            const now = new Date();
            const value = parseInt(expiration);
            const unit = expiration.replace(/[0-9]/g, '');
            
            switch(unit) {
                case 'h': now.setHours(now.getHours() + value); break;
                case 'd': now.setDate(now.getDate() + value); break;
                default: now.setDate(now.getDate() + 1);
            }
            
            return now.toISOString();
        }

        function formatExpiration(expires) {
            if (expires === 'infinity') return 'Infinity';
            
            const date = new Date(expires);
            return date.toLocaleString('pt-BR', {
                day: '2-digit',
                month: '2-digit',
                year: 'numeric',
                hour: '2-digit',
                minute: '2-digit'
            });
        }

        function isExpired(expires) {
            if (expires === 'infinity') return false;
            return new Date() > new Date(expires);
        }

        function getStatusText(expires) {
            if (expires === 'infinity') return 'Infinity';
            if (isExpired(expires)) return 'Expired';
            return 'Active';
        }

        function getStatusClass(expires) {
            if (expires === 'infinity') return 'infinity';
            if (isExpired(expires)) return 'expired';
            return 'active';
        }

        function createKey(name, expiration, prefix) {
            const keys = DB.getKeys();
            
            const newKey = {
                key: generateKey(prefix),
                name: name,
                created_at: new Date().toISOString(),
                expires: getExpirationDate(expiration)
            };
            
            keys.push(newKey);
            DB.setKeys(keys);
            return newKey;
        }

        function deleteKey(keyToDelete) {
            let keys = DB.getKeys();
            keys = keys.filter(k => k.key !== keyToDelete);
            DB.setKeys(keys);
        }

        function deleteAllKeys() {
            if (confirm('Delete all keys permanently?')) {
                DB.setKeys([]);
                loadKeys();
                showToast('All keys deleted', 'success');
            }
        }

        // ========================================
        // UI
        // ========================================

        function loadKeys() {
            const keys = DB.getKeys();
            const tbody = document.getElementById('keysTable');
            const totalKeys = document.getElementById('totalKeys');
            const activeKeys = document.getElementById('activeKeys');
            const expiredKeys = document.getElementById('expiredKeys');

            totalKeys.textContent = keys.length;
            
            let active = 0, expired = 0;
            keys.forEach(k => {
                if (k.expires === 'infinity') active++;
                else if (isExpired(k.expires)) expired++;
                else active++;
            });
            
            activeKeys.textContent = active;
            expiredKeys.textContent = expired;

            if (keys.length === 0) {
                tbody.innerHTML = '<tr><td colspan="5" class="empty">No license keys created yet</td></tr>';
                return;
            }

            let html = '';
            keys.forEach(k => {
                const status = getStatusText(k.expires);
                const statusClass = getStatusClass(k.expires);
                const expiresDisplay = formatExpiration(k.expires);
                const created = new Date(k.created_at).toLocaleString('pt-BR');

                html += `
                    <tr>
                        <td class="key-code">${k.key}</td>
                        <td>${k.name}</td>
                        <td style="font-size:12px;">${expiresDisplay}</td>
                        <td><span class="badge-status ${statusClass}">${status}</span></td>
                        <td>
                            <button class="btn-danger" onclick="deleteKey('${k.key}')" style="padding:4px 12px;font-size:12px;">Delete</button>
                        </td>
                    </tr>
                `;
            });

            tbody.innerHTML = html;
        }

        function copyKey() {
            const key = document.getElementById('newKeyDisplay').textContent;
            navigator.clipboard.writeText(key).then(() => {
                showToast('Key copied to clipboard', 'success');
            }).catch(() => {
                const input = document.createElement('input');
                input.value = key;
                document.body.appendChild(input);
                input.select();
                document.execCommand('copy');
                document.body.removeChild(input);
                showToast('Key copied to clipboard', 'success');
            });
        }

        function showToast(message, type) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = 'toast ' + type + ' show';
            
            clearTimeout(toast._timeout);
            toast._timeout = setTimeout(() => {
                toast.className = 'toast';
            }, 3500);
        }

        // ========================================
        // EVENTOS
        // ========================================

        document.getElementById('createKeyForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const prefix = document.getElementById('keyPrefix').value.trim();
            const name = document.getElementById('keyName').value.trim();
            const expiration = document.getElementById('keyExpiration').value;

            if (!name) {
                showToast('Please enter a key name', 'error');
                return;
            }

            const newKey = createKey(name, expiration, prefix);
            
            document.getElementById('newKeyDisplay').textContent = newKey.key;
            document.getElementById('generatedBox').style.display = 'block';
            
            document.getElementById('keyName').value = '';
            document.getElementById('keyPrefix').value = '';
            
            loadKeys();
            showToast('Key generated successfully', 'success');
        });

        // ========================================
        // INIT
        // ========================================

        console.log('DX11Loader Admin Panel');
        console.log('Keys stored: ' + DB.getKeys().length);
        console.log('Admin password: ' + ADMIN_PASSWORD);
    </script>
</body>
</html>
