<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DX11Loader - Contas</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>DX11LOADER</h1>
            <span class="badge">Contas</span>
        </div>

        <div class="status">
            <span class="dot"></span>
            <span>Sistema de contas online</span>
        </div>

        <!-- Criar Conta -->
        <div class="card">
            <h2>Criar Conta</h2>
            <form id="registerForm">
                <div class="form-group">
                    <label>Usuário</label>
                    <input type="text" id="regUsername" placeholder="Escolha um usuário" required>
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="regEmail" placeholder="Seu email" required>
                </div>
                <div class="form-group">
                    <label>Senha</label>
                    <input type="password" id="regPassword" placeholder="Mínimo 6 caracteres" required>
                </div>
                <button type="submit" class="btn-primary">Criar Conta</button>
            </form>
            <div id="registerMessage" class="message"></div>
        </div>

        <!-- API Info -->
        <div class="card">
            <h2>API - WPF</h2>
            <div class="api-endpoint">
                <span class="method">GET</span>
                <span class="url">api/?action=check&username=admin</span>
                <span class="desc">Verificar se existe</span>
            </div>
            <div class="api-endpoint">
                <span class="method">GET</span>
                <span class="url">api/?action=list</span>
                <span class="desc">Listar todos</span>
            </div>
            <div class="api-endpoint">
                <span class="method">POST</span>
                <span class="url">api/?action=register</span>
                <span class="desc">Criar conta</span>
            </div>
            <div class="api-endpoint">
                <span class="method">POST</span>
                <span class="url">api/?action=login</span>
                <span class="desc">Fazer login</span>
            </div>
        </div>

        <!-- Lista de Contas -->
        <div class="card">
            <h2>Contas Cadastradas <span id="userCount" class="count">(0)</span></h2>
            <div id="usersList">
                <div class="empty">Nenhuma conta</div>
            </div>
        </div>

        <div class="footer">
            <span>API v1.0</span>
            <span>|</span>
            <span>PHP + MySQL</span>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
