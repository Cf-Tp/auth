<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DX11Loader - Contas</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>DX11LOADER</h1>
            <span class="badge">Contas</span>
        </div>

        <div class="status">
            <span class="dot"></span>
            <span>Sistema de contas online</span>
            <span class="status-users">Total: <strong id="totalUsers">0</strong></span>
        </div>

        <!-- Criar Conta -->
        <div class="card">
            <h2>Criar Conta</h2>
            <form id="registerForm">
                <div class="form-group">
                    <label>Usuário</label>
                    <input type="text" id="regUsername" placeholder="Escolha um usuário" required>
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="regEmail" placeholder="Seu email" required>
                </div>
                <div class="form-group">
                    <label>Senha</label>
                    <input type="password" id="regPassword" placeholder="Mínimo 6 caracteres" required>
                </div>
                <button type="submit" class="btn-primary">Criar Conta</button>
            </form>
            <div id="registerMessage" class="message"></div>
        </div>

        <!-- Login -->
        <div class="card">
            <h2>Login</h2>
            <form id="loginForm">
                <div class="form-group">
                    <label>Usuário ou Email</label>
                    <input type="text" id="loginUsername" placeholder="Digite seu usuário" required>
                </div>
                <div class="form-group">
                    <label>Senha</label>
                    <input type="password" id="loginPassword" placeholder="Digite sua senha" required>
                </div>
                <button type="submit" class="btn-primary">Entrar</button>
            </form>
            <div id="loginMessage" class="message"></div>
        </div>

        <!-- API Info -->
        <div class="card">
            <h2>API para WPF</h2>
            <div class="api-endpoint">
                <span class="method">GET</span>
                <span class="url">/?check=admin</span>
                <span class="desc">Verificar se existe</span>
            </div>
            <div class="api-endpoint">
                <span class="method">GET</span>
                <span class="url">/?list</span>
                <span class="desc">Listar todos</span>
            </div>
        </div>

        <div class="footer">
            <span>Dados salvos no localStorage</span>
            <span>|</span>
            <span>GitHub Pages</span>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
